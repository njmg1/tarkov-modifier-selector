<!-- throwaway harness: index.html + an assertion script appended. deleted after run. -->
<div id="OUT" style="display:none"></div>
<script>
window.addEventListener('load', async () => {
  const out = [];
  let fail = 0;
  const chk = (c, m) => { if (!c) { fail++; out.push('FAIL: ' + m); } else out.push('ok: ' + m); };

  const $ = s => document.querySelector(s);
  // canvas render + toBlob time is inherently variable — poll instead of a
  // fixed sleep so this isn't a coin flip under headless/CI load
  const waitFor = async (fn, timeout = 2000, step = 25) => {
    const deadline = performance.now() + timeout;
    while (performance.now() < deadline) {
      if (fn()) return true;
      await new Promise(r => setTimeout(r, step));
    }
    return false;
  };
  const bal = () => $('#balance').textContent.trim();
  const detail = () => $('#meterDetail').textContent.trim();
  const verdict = () => $('#verdict').textContent.trim();
  const cardByName = n => [...document.querySelectorAll('.card')]
    .find(c => c.querySelector('h3').textContent === n);
  const click = n => cardByName(n).click();

  // clean slate regardless of any persisted state
  $('#resetBtn').click();

  chk(document.querySelectorAll('.card').length === 36, '36 cards rendered');
  chk(document.querySelectorAll('.card.global').length === 6, '6 global cards');
  chk(document.querySelectorAll('button.card').length === 30, '30 clickable cards');
  chk(cardByName('KAPPA PROTOCOL').querySelector('.val').textContent === '-21', 'kappa shows -21');
  chk(cardByName('NO FLEA MARKET').querySelector('.val').textContent === '+6', 'flea shows +6');
  chk(!cardByName('NO INSURANCE').querySelector('.val'), 'global card shows no value');

  chk(bal() === '0' && verdict() === 'PASS', 'empty build: 0 / PASS');

  click('NO FLEA MARKET');                       // +6
  chk(bal() === '6', 'after +6 handicap, balance 6 (got ' + bal() + ')');
  chk(detail() === '디버프 +6 · 퍽 −0', 'detail line: ' + detail());
  chk(cardByName('NO FLEA MARKET').getAttribute('aria-pressed') === 'true', 'aria-pressed set');
  chk(cardByName('KAPPA PROTOCOL').classList.contains('unaffordable'), 'kappa flagged unaffordable at balance 6');
  chk(!cardByName('SPRINTER').classList.contains('unaffordable'), 'sprinter(-2) affordable at balance 6');

  click('SPRINTER');                             // -2
  chk(bal() === '4', 'after -2 perk, balance 4 (got ' + bal() + ')');
  chk(verdict() === 'PASS', 'still PASS at 4');

  click('SPRINTER');                             // toggle off
  chk(bal() === '6', 'toggle off restores 6 (got ' + bal() + ')');

  click('KAPPA PROTOCOL');                       // -21 -> overspend
  chk(bal() === '-15', 'overspent balance -15 (got ' + bal() + ')');
  chk(verdict() === 'OVER BUDGET', 'verdict OVER BUDGET');
  chk($('#bar').classList.contains('over'), 'bar in over state');
  chk($('#balance').classList.contains('bad'), 'balance styled bad');

  // hash round-trip
  const hash = location.hash;
  chk(/^#b=[0-9a-z]+$/.test(hash), 'hash written: ' + hash);

  // "선택만" hides unselected + the global section
  $('#onlyBtn').click();
  chk(cardByName('SPRINTER').hidden === true, 'onlyMode hides unselected card');
  chk(cardByName('KAPPA PROTOCOL').hidden === false, 'onlyMode keeps selected card');
  chk($('#sec-global').hidden === true, 'onlyMode hides global section');
  $('#onlyBtn').click();
  chk($('#sec-global').hidden === false, 'onlyMode off restores global section');

  // language toggle
  chk(document.body.classList.contains('lang-ko'), 'starts in ko');
  $('#langBtn').click();
  chk(document.body.classList.contains('lang-en'), 'toggles to en');
  $('#langBtn').click();

  // max-budget build: every handicap on, kappa on -> 13 left
  $('#resetBtn').click();
  ['HEMOPHILIA','OSTEOPOROSIS','EXHAUSTION','WELL THAT HURT!','INCOMPETENT','POLYDIPSIA',
   'CHRONIC FATIGUE SYNDROME','PERSONALITY VACUUM','DR. JEKYLL','ALLERGIC',
   'BROKEN SECURE CONTAINER','NO FLEA MARKET','THIRD LEG'].forEach(click);
  chk(bal() === '34', 'all handicaps = 34 (got ' + bal() + ')');
  click('KAPPA PROTOCOL');
  chk(bal() === '13', 'all handicaps + kappa = 13 (got ' + bal() + ')');
  chk(verdict() === 'PASS', 'kappa build passes');

  // icons: every card must resolve a data-URI mask that actually paints
  const icons = [...document.querySelectorAll('.card .icon')];
  chk(icons.length === 36, '36 card icons');
  chk(icons.every(i => /^url\("data:image\/png;base64,/.test(i.style.getPropertyValue('--ic'))),
      'all icons wired to data URIs');
  chk(icons.every(i => getComputedStyle(i).maskImage.startsWith('url("data:image/png')),
      'computed mask-image resolves');
  // cards shrink their icon below 620px
  const iconSize = innerWidth <= 620 ? 44 : 56;
  chk(icons.every(i => i.clientWidth === iconSize && i.clientHeight === iconSize),
      `icons laid out ${iconSize}x${iconSize}`);

  // all three clipped source translations have been filled in
  chk(document.querySelectorAll('.ko .trunc').length === 0, 'no truncation markers left');
  chk(/50% 줄어듦$/.test(cardByName('BUSHBORNE').querySelector('.ko').textContent), 'bushborne ko complete');
  chk(/\(크래프팅 제외\)$/.test(cardByName('INCOMPETENT').querySelector('.ko').textContent), 'incompetent ko complete');
  chk(/생기는 디버프\)$/.test(cardByName('DR. JEKYLL').querySelector('.ko').textContent), 'dr jekyll ko complete');

  // korean titles beside the english ones
  chk(document.querySelectorAll('.ko-name').length === 36, '36 korean titles');
  const koTitle = n => cardByName(n).querySelector('.ko-name').textContent;
  for (const [en, ko] of [
    ['KAPPA PROTOCOL', '카파 프로토콜'], ['NO FLEA MARKET', '플리마켓 금지'],
    ['DIET', '다이어트'], ['WELL THAT HURT!', '개아픔;;'],
    ['BUSHBORNE', '부시본 (하이드 온 부쉬)'], ['INCOMPETENT', '무능'], ['DR. JEKYLL', '지킬박사'],
  ]) chk(koTitle(en) === ko, `ko title ${en} = ${ko} (got ${koTitle(en)})`);

  // ---- exclusions ------------------------------------------------------
  $('#resetBtn').click();
  const veil = n => cardByName(n).querySelector('.block-msg').textContent;
  const blocked = n => cardByName(n).classList.contains('blocked');

  chk(EXCLUSIONS.length === 7, '7 exclusion pairs');
  chk(EXCLUSIONS.every(e => e.a >= 7 && e.b <= 36), 'exclusions only cover selectable ids');
  chk(document.querySelectorAll('.card.blocked').length === 0, 'nothing blocked on a clean slate');

  // an "opposite" pair: picking one veils the other, both directions
  click('THROMBOPHILIA');                       // -2, bleeding down
  chk(blocked('HEMOPHILIA'), 'HEMOPHILIA blocked by THROMBOPHILIA');
  chk(veil('HEMOPHILIA').startsWith('상반된 효과 선택됨'), 'opposite veil text: ' + veil('HEMOPHILIA'));
  chk(/출혈 확률/.test(veil('HEMOPHILIA')), 'veil names the axis');
  chk(!cardByName('HEMOPHILIA').classList.contains('guess'), 'opposite pair is not a guess');
  chk(cardByName('HEMOPHILIA').getAttribute('aria-disabled') === 'true', 'blocked card aria-disabled');
  {
    // the message must be readable: card contents faded, veil covering the card
    const c = cardByName('HEMOPHILIA');
    chk(parseFloat(getComputedStyle(c.querySelector('.body')).opacity) < 0.3,
        'blocked card body faded out');
    const cr = c.getBoundingClientRect(), vr = c.querySelector('.block-veil').getBoundingClientRect();
    chk(Math.abs(cr.width - vr.width) < 2 && Math.abs(cr.height - vr.height) < 2,
        'veil covers the whole card');
    chk(getComputedStyle(c.querySelector('.block-veil')).display === 'flex', 'veil is shown');
  }

  // clicking a blocked card must not select it
  const before = bal();
  click('HEMOPHILIA');
  chk(bal() === before, 'clicking a blocked card changes nothing');
  chk(!cardByName('HEMOPHILIA').classList.contains('on'), 'blocked card did not turn on');

  // releasing the blocker un-veils it
  click('THROMBOPHILIA');
  chk(!blocked('HEMOPHILIA'), 'un-blocked once the opposite is deselected');
  chk(document.querySelectorAll('.card.blocked').length === 0, 'no veils left');

  // and it works from the other side too
  click('HEMOPHILIA');
  chk(blocked('THROMBOPHILIA'), 'exclusion is symmetric');
  click('HEMOPHILIA');

  // one modifier can block two others (YOUTH)
  click('YOUTH');
  chk(blocked('CHRONIC FATIGUE SYNDROME') && blocked('EXHAUSTION'), 'YOUTH blocks both its opposites');
  chk(!blocked('POLYPHAGIA'), 'YOUTH does not block a same-direction perk');
  click('YOUTH');

  // the 'guess' pair is worded differently
  click('AVERAGE');
  chk(blocked('INCOMPETENT'), 'INCOMPETENT blocked by AVERAGE');
  chk(cardByName('INCOMPETENT').classList.contains('guess'), 'guess pair flagged');
  chk(veil('INCOMPETENT').startsWith('추측하기론 동시 선택 안될듯'), 'guess veil text: ' + veil('INCOMPETENT'));
  click('AVERAGE');

  // pairs the analysis deliberately left out must stay selectable together
  click('MARATHON RUNNER'); click('EXHAUSTION');
  chk(cardByName('MARATHON RUNNER').classList.contains('on') &&
      cardByName('EXHAUSTION').classList.contains('on'),
      'MARATHON RUNNER + EXHAUSTION coexist (different axes)');
  $('#resetBtn').click();
  click('SPRINTER'); click('THIRD LEG');
  chk(cardByName('SPRINTER').classList.contains('on') && cardByName('THIRD LEG').classList.contains('on'),
      'SPRINTER + THIRD LEG coexist');
  $('#resetBtn').click();
  click('THE TARKOV SHOOTER'); click('INCOMPETENT');
  chk(cardByName('THE TARKOV SHOOTER').classList.contains('on') &&
      cardByName('INCOMPETENT').classList.contains('on'),
      'TARKOV SHOOTER + INCOMPETENT coexist (bolt-action is excluded)');
  $('#resetBtn').click();

  // A link naming both halves of a pair must be sanitised, not rendered.
  // ids 18 (THROMBOPHILIA) and 24 (HEMOPHILIA) => bits 11 and 17.
  const conflictCode = (2 ** 11 + 2 ** 17).toString(36);
  location.hash = `#b=${conflictCode}`;
  await new Promise(r => setTimeout(r, 60));            // hashchange is async
  const onNow = [...document.querySelectorAll('button.card.on')]
    .map(c => c.querySelector('h3').textContent);
  chk(onNow.length === 1 && onNow[0] === 'THROMBOPHILIA',
      'conflicting link keeps only the first: ' + onNow);
  chk(blocked('HEMOPHILIA'), 'the dropped half shows its veil');

  location.hash = '';
  $('#resetBtn').click();

  // ---- version ---------------------------------------------------------
  chk(typeof APP_VERSION === 'string' && APP_VERSION.length > 0, 'APP_VERSION defined');
  chk($('#verTag').textContent === `v${APP_VERSION}`, 'header shows v' + APP_VERSION);
  chk($('#verFoot').textContent === `버전 ${APP_VERSION}`, 'footer shows the version');

  // ---- promo banner ---------------------------------------------------
  const promo = $('.promo');
  chk(promo !== null, 'promo banner present');
  const char = $('#promoChar');
  chk(/^data:image\/png;base64,/.test(char.src), 'character is an inlined data URI');
  chk(char.naturalWidth === 249 && char.naturalHeight === 235, 'character decoded 249x235');
  chk(char.complete, 'character image loaded');
  const hrefs = [...promo.querySelectorAll('a')].map(a => a.href);
  chk(hrefs.includes('https://www.youtube.com/@NoJamMangGame'), 'youtube link');
  chk(hrefs.includes('https://x.com/NoJamMangGameTV'), 'x link');
  chk([...promo.querySelectorAll('a')].every(a => a.target === '_blank' && /noopener/.test(a.rel)),
      'promo links open safely in a new tab');
  chk(/노잼망겜/.test($('.promo-name').textContent), 'channel name shown');
  chk(promo.getBoundingClientRect().top < $('#sec-global').getBoundingClientRect().top,
      'promo sits above the modifier list');

  // ---- sidebar --------------------------------------------------------
  const picks = () => [...document.querySelectorAll('#picks .pick')];
  const pickNames = () => picks().map(p => p.querySelector('.nm').textContent);

  $('#resetBtn').click();
  chk($('#picks .picks-empty') !== null, 'empty sidebar shows placeholder');
  chk(picks().length === 0, 'no pick rows when empty');
  chk($('#pickCount').textContent === '0 / 30', 'count starts 0/30');

  click('NO FLEA MARKET');            // +6
  click('SPRINTER');                  // -2
  chk(picks().length === 2, 'two rows listed');
  chk($('#picks .picks-empty') === null, 'placeholder gone');
  chk($('#pickCount').textContent === '2 / 30', 'count 2/30');
  // handicaps group first, perks second
  chk(pickNames().join('|') === '플리마켓 금지|단거리 주자', 'grouped handicap-then-perk: ' + pickNames());
  chk($('#fGain').textContent === '+6', 'sidebar gain +6');
  chk($('#fCost').textContent === '−2', 'sidebar cost −2');
  chk($('#fLeft').textContent === '4', 'sidebar balance 4');
  chk(!$('#fLeftRow').classList.contains('bad'), 'sidebar balance not flagged bad');
  chk(picks().every(p => /^url\("data:image\/png/.test(
        p.querySelector('.icon').style.getPropertyValue('--ic'))), 'pick rows have icons');
  // .v and .x share one grid cell; if either loses its explicit placement the
  // value wraps onto a second row and the row grows. Compare vertical centres —
  // the two spans have different font sizes, so their offsetTops never match.
  // The aside is display:none on phones, so every offset* reads 0 there.
  // Geometry only means something where the thing is actually laid out.
  const asideLaidOut = $('aside').offsetParent !== null;
  const midY = (e) => e.offsetTop + e.offsetHeight / 2;
  if (asideLaidOut) {
    chk(picks().every(p => Math.abs(midY(p.querySelector('.v')) - midY(p.querySelector('.nm'))) <= 1.5),
        'pick value sits on the name row, not wrapped below');
    chk(picks().every(p => p.querySelector('.v').offsetLeft > p.querySelector('.nm').offsetLeft),
        'pick value is right of the name');
    chk(picks().every(p => p.offsetHeight < 40), 'pick rows stay single-line');
  } else {
    // ...and on phones the same rows live in the sheet, so check those instead
    const rows = [...document.querySelectorAll('#sheetPicks .pick')];
    chk(rows.length > 0, 'sheet has rows on phone');
    chk(rows.every(p => Math.abs(midY(p.querySelector('.v')) - midY(p.querySelector('.nm'))) <= 1.5),
        'sheet pick value sits on the name row');
    chk(rows.every(p => p.querySelector('.v').offsetLeft > p.querySelector('.nm').offsetLeft),
        'sheet pick value is right of the name');
  }

  // clicking a row deselects that modifier
  picks().find(p => p.querySelector('.nm').textContent === '단거리 주자').click();
  chk(picks().length === 1, 'row click removed the perk');
  chk(cardByName('SPRINTER').classList.contains('on') === false, 'card deselected too');
  chk(bal() === '6', 'balance back to 6 after row removal');

  click('KAPPA PROTOCOL');            // -21 -> overspend
  chk($('#fLeftRow').classList.contains('bad'), 'sidebar balance flagged bad when over');
  chk($('#fLeft').textContent === '-15', 'sidebar shows -15');

  $('#resetBtn').click();
  chk(bal() === '0', 'reset back to 0');
  chk($('#picks .picks-empty') !== null, 'sidebar empty again after reset');

  // ---- bottom sheet ----------------------------------------------------
  // There must be exactly one toolbar and one set of button ids, wherever it lives.
  chk(document.querySelectorAll('.tools').length === 1, 'exactly one .tools node');
  for (const id of ['langBtn','onlyBtn','shotBtn','shareBtn','resetBtn'])
    chk(document.querySelectorAll('#' + id).length === 1, `single #${id}`);
  chk($('#sheet') !== null, 'sheet present in DOM');
  chk($('#sheetPicks') !== null, 'sheet has its own picks container');

  // the sheet list mirrors the aside list
  $('#resetBtn').click();
  click('NO FLEA MARKET'); click('SPRINTER');
  const asideNames = [...document.querySelectorAll('#picks .pick .nm')].map(e => e.textContent);
  const sheetNames = [...document.querySelectorAll('#sheetPicks .pick .nm')].map(e => e.textContent);
  chk(asideNames.length === 2 && asideNames.join('|') === sheetNames.join('|'),
      'sheet mirrors aside: ' + sheetNames);
  chk($('#sheetCount').textContent === '2개 선택', 'sheet count: ' + $('#sheetCount').textContent);
  chk($('#sheetBal').textContent === '4', 'sheet balance 4 (got ' + $('#sheetBal').textContent + ')');
  chk($('#sheetVerdict').textContent === 'PASS', 'sheet verdict PASS');

  // a row in the sheet deselects, same as the aside
  document.querySelector('#sheetPicks .pick').click();
  chk(document.querySelectorAll('#sheetPicks .pick').length === 1, 'sheet row click removes');
  chk(document.querySelectorAll('#picks .pick').length === 1, 'aside stayed in sync');

  click('KAPPA PROTOCOL');
  chk($('#sheetVerdict').textContent === 'OVER', 'sheet verdict OVER when overspent');
  chk($('#sheetBal').classList.contains('bad'), 'sheet balance flagged bad');

  // expand / collapse — tap
  chk(!$('#sheet').classList.contains('open'), 'sheet starts collapsed');
  chk($('#sheetBar').getAttribute('aria-expanded') === 'false', 'aria-expanded false');
  chk($('#sheetArrow') !== null, 'explicit expand arrow present');
  $('#sheetBar').click();
  chk($('#sheet').classList.contains('open'), 'sheet opens on bar tap');
  chk($('#sheetBar').getAttribute('aria-expanded') === 'true', 'aria-expanded true');
  $('#sheetBar').click();
  chk(!$('#sheet').classList.contains('open'), 'sheet collapses again');

  // expand / collapse — drag, simulated with synthetic PointerEvents. Real
  // wall-clock delays between moves matter here: the handler's flick
  // detection divides by elapsed time, and dispatching every step in the
  // same tick would make that time ~0 and every drag read as a flick.
  const barY = $('#sheetBar').getBoundingClientRect().top + 20;
  const swipe = async (fromY, toY, steps = 6) => {
    const id = 1;
    $('#sheetBar').dispatchEvent(new PointerEvent('pointerdown', {
      clientY: fromY, pointerId: id, isPrimary: true, bubbles: true, cancelable: true }));
    for (let i = 1; i <= steps; i++) {
      await new Promise(r => setTimeout(r, 12));
      $('#sheetBar').dispatchEvent(new PointerEvent('pointermove', {
        clientY: fromY + (toY - fromY) * (i / steps), pointerId: id, bubbles: true, cancelable: true }));
    }
    await new Promise(r => setTimeout(r, 12));
    $('#sheetBar').dispatchEvent(new PointerEvent('pointerup', {
      clientY: toY, pointerId: id, bubbles: true, cancelable: true }));
  };

  // Large deltas (way past both the 35%-of-height and the flick-velocity
  // threshold) so the outcome doesn't hinge on exactly which branch fires.
  await swipe(barY, barY - 700);
  chk($('#sheet').classList.contains('open'), 'drag up past threshold opens the sheet');

  // the browser's trailing click after a touch/mouse drag must not re-toggle it
  $('#sheetBar').dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
  chk($('#sheet').classList.contains('open'), 'trailing click after a drag is swallowed');

  // small drag, well under either threshold -> snaps back to where it started
  await swipe(barY, barY + 20);
  chk($('#sheet').classList.contains('open'), 'a small drag below threshold settles back open');

  // drag down past the threshold from open -> closes
  await swipe(barY, barY + 700);
  chk(!$('#sheet').classList.contains('open'), 'drag down past threshold closes the sheet');

  // a real keyboard click still works after all that pointer activity —
  // wait out the trailing-click suppression window from the last drag first
  await new Promise(r => setTimeout(r, 450));
  $('#sheetBar').click();
  chk($('#sheet').classList.contains('open'), 'keyboard-style click still toggles after drags');
  $('#sheetBar').click();
  chk(!$('#sheet').classList.contains('open'), 'closes again');

  $('#resetBtn').click();

  // ---- section subtitles ----------------------------------------------
  const subs = [...document.querySelectorAll('.sec-ko')].map(e => e.textContent);
  chk(subs.join('|') === '공통 적용 사항|선택 적용 사항|선택 적용 사항', 'section subtitles: ' + subs);
  // scope to the rendered UI — body.textContent would also pick up this script
  const uiText = $('header').textContent + $('.wrap').textContent;
  chk(!/예산/.test(uiText), 'no stray 예산 wording left');
  chk(/잔여 포인트/.test(uiText), '잔여 포인트 label present');
  chk(/디버프 \(부정적 효과\)/.test(uiText) === false, 'group labels only appear once picks exist');

  // ---- share image ----------------------------------------------------
  chk($('#shotBtn') !== null, 'screenshot button present');
  click('NO FLEA MARKET'); click('SPRINTER'); click('HEMOPHILIA');
  try {
    const cv = await window.__renderShareImage(2);
    chk(cv instanceof HTMLCanvasElement, 'share image returns a canvas');
    chk(cv.width === 860 * 2, 'canvas width 860@2x (got ' + cv.width + ')');
    chk(cv.height > 400 && cv.height < 4000, 'canvas height sane: ' + cv.height);

    const c = cv.getContext('2d');
    // canvas must not be tainted — every image on it is a data URI
    let tainted = false;
    try { c.getImageData(0, 0, 1, 1); } catch { tainted = true; }
    chk(!tainted, 'canvas is not tainted (toBlob/toDataURL will work)');
    chk(cv.toDataURL('image/png').startsWith('data:image/png;base64,'), 'exports a png');

    // it actually drew something. First row starts at HEAD+SUM+GHEAD = 190;
    // its icon occupies x 30..60, y 196..226.
    const px = (x, y) => c.getImageData(x * 2, y * 2, 1, 1).data;
    const bright = (p) => p[0] + p[1] + p[2];
    const boxMax = (x0, y0, w, h) => {
      const d = c.getImageData(x0 * 2, y0 * 2, w * 2, h * 2).data;
      let best = 0;
      for (let i = 0; i < d.length; i += 4) best = Math.max(best, d[i] + d[i+1] + d[i+2]);
      return best;
    };
    chk(bright(px(80, 40)) > 300, 'title text painted');
    chk(boxMax(30, 196, 30, 30) > 200, 'an icon painted in the first row');
    chk(boxMax(30, 200, 500, 60) > 400, 'row text painted');
    // the description line only exists because we now draw it
    chk(boxMax(74, 216, 400, 20) > 150, 'description line painted under the title');

    // height must track the number of rows
    const h3 = cv.height;
    click('KAPPA PROTOCOL');
    const cv2 = await window.__renderShareImage(2);
    chk(cv2.height > h3, 'canvas grows with an extra row (' + h3 + ' -> ' + cv2.height + ')');
  } catch (e) {
    chk(false, 'share image threw: ' + e.message);
  }

  // ---- image preview modal --------------------------------------------
  chk($('#modal').hidden, 'modal starts hidden');
  $('#shotBtn').click();
  const modalOpened = await waitFor(() => !$('#modal').hidden);
  chk(modalOpened, 'modal opens after 이미지 저장');
  chk(/^data:image\/png;base64,/.test($('#shotImg').src), 'preview img is a data URI');
  chk($('#shotImg').naturalWidth > 0, 'preview img decoded');
  chk($('#dlBtn') !== null, 'download button present');
  chk(getComputedStyle($('#shotImg')).webkitTouchCallout !== 'none',
      'long-press menu not suppressed on the image');
  $('#modalClose').click();
  chk($('#modal').hidden, 'modal closes via ×');
  chk(!$('#shotImg').getAttribute('src'), 'preview src released on close');

  // empty selection must not open the modal
  $('#resetBtn').click();
  $('#shotBtn').click();
  await new Promise(r => setTimeout(r, 120));
  chk($('#modal').hidden, 'modal stays shut with nothing selected');

  $('#resetBtn').click();

  // ---- layout sanity ---------------------------------------------------
  // Nothing may push the page sideways, at any width we support.
  chk(document.documentElement.scrollWidth <= innerWidth + 1,
      `no horizontal overflow (scrollWidth ${document.documentElement.scrollWidth} vs ${innerWidth})`);

  // Cards must contain their own text — clipping here means a wrap went wrong.
  const overflowing = [...document.querySelectorAll('.card')].filter(
    c => c.scrollHeight > c.clientHeight + 1 || c.scrollWidth > c.clientWidth + 1);
  chk(overflowing.length === 0,
      'no card clips its content (' + overflowing.map(c => c.querySelector('h3').textContent) + ')');

  // The value chip must never collide with the title text.
  const collide = [...document.querySelectorAll('.card .val')].filter((v) => {
    const h3 = v.closest('.title').querySelector('h3');
    const a = v.getBoundingClientRect(), b = h3.getBoundingClientRect();
    return a.left < b.right - 1 && a.right > b.left + 1 && a.top < b.bottom - 1 && a.bottom > b.top + 1;
  });
  chk(collide.length === 0, 'value never overlaps its title');

  document.title = fail ? `${fail} FAILURES` : 'ALL PASS';
  document.getElementById('OUT').textContent = '\n' + out.join('\n') + '\n';
  document.getElementById('OUT').style.display = 'block';
});
</script>
